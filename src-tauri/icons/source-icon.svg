<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="0.5" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#9333ea"/>
    </linearGradient>
    <linearGradient id="capTop" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e0e7ff"/>
    </linearGradient>
    <radialGradient id="spark" cx="0.5" cy="0.45" r="0.6">
      <stop offset="0" stop-color="#fffbeb"/>
      <stop offset="0.45" stop-color="#fde047"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </radialGradient>
    <filter id="ds" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#1e1b4b" flood-opacity="0.4"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="0" stdDeviation="14" flood-color="#fde047" flood-opacity="0.8"/>
    </filter>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1024" height="1024" rx="230" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="470" rx="230" fill="#ffffff" opacity="0.07"/>

  <g filter="url(#ds)">
    <!-- cap underside / band -->
    <path d="M 330 470 L 512 552 L 694 470 L 694 600
             C 694 662 612 702 512 702
             C 412 702 330 662 330 600 Z" fill="#a5b4fc"/>
    <path d="M 330 470 L 512 552 L 694 470 L 694 540
             C 694 600 612 638 512 638
             C 412 638 330 600 330 540 Z" fill="#c7d2fe"/>

    <!-- mortarboard top (diamond) -->
    <polygon points="512,236 836,386 512,536 188,386" fill="url(#capTop)"/>
    <polygon points="512,236 836,386 512,536 188,386" fill="none" stroke="#c7d2fe" stroke-width="3" opacity="0.6"/>

    <!-- button on board -->
    <circle cx="512" cy="386" r="22" fill="#a5b4fc"/>

    <!-- tassel cord -->
    <path d="M 512 386 L 760 410 L 760 600" stroke="#fde047" stroke-width="14"
          fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="760" cy="408" r="16" fill="#fde047"/>
    <!-- tassel knot + strands -->
    <circle cx="760" cy="610" r="26" fill="#facc15"/>
    <path d="M 745 628 L 742 690 M 760 632 L 760 696 M 775 628 L 778 688"
          stroke="#facc15" stroke-width="12" stroke-linecap="round"/>
  </g>

  <!-- AI spark: 4-point star -->
  <g transform="translate(706,742)" filter="url(#glow)">
    <path d="M 0 -96 C 16 -36 36 -16 96 0 C 36 16 16 36 0 96 C -16 36 -36 16 -96 0 C -36 -16 -16 -36 0 -96 Z"
          fill="url(#spark)"/>
    <circle cx="0" cy="0" r="22" fill="#ffffff" opacity="0.9"/>
  </g>

  <!-- small accent sparks -->
  <g fill="#fde047">
    <path d="M 322 712 C 328 688 344 672 368 666 C 344 660 328 644 322 620 C 316 644 300 660 276 666 C 300 672 316 688 322 712 Z" opacity="0.95"/>
    <circle cx="262" cy="772" r="13" opacity="0.85"/>
  </g>
</svg>
